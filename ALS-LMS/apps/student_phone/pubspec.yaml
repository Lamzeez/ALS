name: student_phone
description: ALS Student Mobile App - Offline-first LMS for the Alternative Learning System
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  go_router: ^14.0.0

  # Supabase & Auth
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.2
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.2

  # Offline Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking & Connectivity
  connectivity_plus: ^6.1.1
  http: ^1.2.2

  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Camera & Media
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  video_player: ^2.9.2
  chewie: ^1.8.5
  syncfusion_flutter_pdfviewer: ^27.1.58
  url_launcher: ^6.3.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  json_annotation: ^4.9.0

  # Local packages
  shared_models:
    path: ../../packages/shared_models
  shared_services:
    path: ../../packages/shared_services
  shared_ui:
    path: ../../packages/shared_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
